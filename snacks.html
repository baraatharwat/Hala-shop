```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السناكات - هلا شوب</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#16a34a;
color:white;
text-align:center;
padding:20px;
}

.back{
display:inline-block;
margin:15px;
background:#16a34a;
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.product img{
width:120px;
height:120px;
object-fit:contain;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

button{
width:35px;
height:35px;
font-size:18px;
border:none;
border-radius:8px;
background:#16a34a;
color:white;
cursor:pointer;
}

.cart{
position:fixed;
top:20px;
left:20px;
background:#16a34a;
color:white;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="cart">
🛒 <span id="cart">0</span>
</div>

<header>
<h1>🍫 السناكات</h1>
</header>

<a class="back" href="index.html">⬅ العودة للرئيسية</a>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1582058091505-f87a2e55a40f?w=300">
<h3>KitKat</h3>
<p>0.300 KD</p>
<div class="controls">
<button onclick="minus('s1')">-</button>
<span id="s1">0</span>
<button onclick="plus('s1')">+</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1621939514649-280e2ee25f60?w=300">
<h3>Doritos</h3>
<p>0.350 KD</p>
<div class="controls">
<button onclick="minus('s2')">-</button>
<span id="s2">0</span>
<button onclick="plus('s2')">+</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1613919113640-25732ec5e61f?w=300">
<h3>Chips</h3>
<p>0.250 KD</p>
<div class="controls">
<button onclick="minus('s3')">-</button>
<span id="s3">0</span>
<button onclick="plus('s3')">+</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1589984662646-e7b2e4962f18?w=300">
<h3>Galaxy</h3>
<p>0.400 KD</p>
<div class="controls">
<button onclick="minus('s4')">-</button>
<span id="s4">0</span>
<button onclick="plus('s4')">+</button>
</div>
</div>

</div>

<script>
let total=0;

function plus(id){
let x=document.getElementById(id);
x.innerText=parseInt(x.innerText)+1;
total++;
document.getElementById("cart").innerText=total;
}

function minus(id){
let x=document.getElementById(id);

if(parseInt(x.innerText)>0){
x.innerText=parseInt(x.innerText)-1;
total--;
document.getElementById("cart").innerText=total;
}
}
</script>

</body>
</html>
