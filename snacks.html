<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السناكات - هلا شوب</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:Arial,sans-serif; background:#0a0a0a; color:white; }
header{ background:#111; padding:20px; text-align:center; border-bottom:3px solid #22c55e; }
.cart{ position:fixed; top:20px; left:20px; background:#22c55e; padding:10px 15px; border-radius:10px; font-weight:bold; cursor:pointer; }
.back{ display:inline-block; margin:20px; background:#22c55e; color:white; padding:10px 15px; border-radius:8px; text-decoration:none; }
.products{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; padding:20px; }
.product{ background:#151515; border:1px solid #333; padding:20px; border-radius:15px; text-align:center; }
.controls{ display:flex; justify-content:center; align-items:center; gap:15px; margin-top:15px; }
button{ width:40px; height:40px; border:none; border-radius:8px; background:#22c55e; color:white; font-size:20px; cursor:pointer; }
span{ font-size:18px; font-weight:bold; min-width:20px; display:inline-block; }
</style>
</head>
<body>

<div class="cart" onclick="window.location.href='cart.html'">
🛒 السلة (<span id="cart">0</span>)
</div>

<header><h1>🍫 السناكات</h1></header>
<a class="back" href="index.html">⬅ العودة للرئيسية</a>

<div class="products">
<div class="product">
  <h3>Chips (شيبس)</h3>
  <p>0.150 KD</p>
  <div class="controls">
    <button onclick="minus('s1')">-</button>
    <span id="s1">0</span>
    <button onclick="plus('s1')">+</button>
  </div>
</div>

<div class="product">
  <h3>KitKat (كيت كات)</h3>
  <p>0.200 KD</p>
  <div class="controls">
    <button onclick="minus('s2')">-</button>
    <span id="s2">0</span>
    <button onclick="plus('s2')">+</button>
  </div>
</div>

<div class="product">
  <h3>Doritos (دوريتوس)</h3>
  <p>0.300 KD</p>
  <div class="controls">
    <button onclick="minus('s3')">-</button>
    <span id="s3">0</span>
    <button onclick="plus('s3')">+</button>
  </div>
</div>
</div>

<script>
let cartData = JSON.parse(localStorage.getItem("halaCart")) || {};
window.onload = function() {
  ["s1", "s2", "s3"].forEach(id => {
    if (cartData[id]) document.getElementById(id).innerText = cartData[id];
  });
  updateTotal();
};
function plus(id) {
  let x = document.getElementById(id);
  let val = parseInt(x.innerText) + 1;
  x.innerText = val;
  cartData[id] = val;
  localStorage.setItem("halaCart", JSON.stringify(cartData));
  updateTotal();
}
function minus(id) {
  let x = document.getElementById(id);
  let val = parseInt(x.innerText);
  if (val > 0) {
    val--;
    x.innerText = val;
    if (val === 0) delete cartData[id];
    else cartData[id] = val;
    localStorage.setItem("halaCart", JSON.stringify(cartData));
    updateTotal();
  }
}
function updateTotal() {
  let totalCount = 0;
  Object.values(cartData).forEach(qty => { totalCount += qty; });
  document.getElementById("cart").innerText = totalCount;
}
</script>
</body>
</html>
