<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الخضروات</title>

<style>
body{background:#0a0a0a;color:white;font-family:Arial;margin:0}
header{background:#111;padding:20px;text-align:center}
.back{margin:10px;display:inline-block;background:#22c55e;padding:10px;border-radius:8px;color:white;text-decoration:none}
.product{background:#151515;margin:15px;padding:15px;border-radius:10px}
button{background:#22c55e;border:none;color:white;padding:5px 10px;border-radius:6px}
.cart{position:fixed;top:15px;left:15px;background:#22c55e;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div class="cart">🛒 <span id="cartCount">0</span></div>

<header><h1>🥬 الخضروات</h1></header>
<a class="back" href="index.html">رجوع</a>

<div class="product">Tomato <button onclick="add('Tomato')">+</button></div>
<div class="product">Cucumber <button onclick="add('Cucumber')">+</button></div>
<div class="product">Potato <button onclick="add('Potato')">+</button></div>

<script>
let cart = JSON.parse(localStorage.getItem("halaCart")) || {};

function add(item){
cart[item] = (cart[item] || 0) + 1;
localStorage.setItem("halaCart", JSON.stringify(cart));
update();
}

function update(){
let total = 0;
for(let i in cart) total += cart[i];
document.getElementById("cartCount").innerText = total;
}
update();
</script>

</body>
</html>
