<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هلا شوب</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

header{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  text-align:center;
  padding:50px;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:16px;
  text-align:center;
  margin-top:15px;
}

.btn{
  display:inline-block;
  background:#22c55e;
  color:black;
  padding:12px 16px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.cartBox{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
</style>
</head>

<body>

<header>
  <h1>🛒 هلا شوب</h1>
  <p>بقالة إلكترونية</p>
</header>

<div class="container">

<div class="card">
  <h2>الأقسام</h2>
  <a class="btn" href="drinks.html">🥤 المشروبات</a>
</div>

<div class="card">
  <h2>🛒 السلة</h2>
  <div id="cartBox">تحميل...</div>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

let totalItems = cart.reduce((a,b)=>a+b.qty,0);
let totalPrice = cart.reduce((a,b)=>a+(b.price*b.qty),0);

document.getElementById("cartBox").innerHTML =
`عدد المنتجات: ${totalItems}<br>المجموع: ${totalPrice.toFixed(3)} KD`;
</script>

</body>
</html>
