<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هلا شوب</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

header{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  text-align:center;
  padding:50px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h2{color:#22c55e}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card a{
  display:block;
  padding:12px;
  background:#22c55e;
  color:black;
  text-decoration:none;
  font-weight:bold;
}
</style>

</head>

<body>

<header>
  <h1>🛒 هلا شوب</h1>
  <p>متجر إلكتروني - توصيل سريع</p>
</header>

<div class="container">

<h2>الأقسام</h2>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908177225-1c2f5b8c2b3a" />
    <a href="drinks.html">المشروبات 🥤</a>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1605478036366-7f6f0f0d0a6b" />
    <a href="#">الوجبات 🍫</a>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1580915411954-282cb1b0d780" />
    <a href="#">الألبان 🥛</a>
  </div>

</div>

</div>

</body>
</html>
