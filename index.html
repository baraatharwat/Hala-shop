<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هلا شوب</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

header{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  text-align:center;
  padding:50px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h2{color:#22c55e}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card a{
  display:block;
  padding:12px;
  background:#22c55e;
  color:black;
  text-decoration:none;
  font-weight:bold;
}
</style>

</head>

<body>

<header>
  <h1>🛒 هلا شوب</h1>
  <p>متجر إلكتروني - توصيل سريع</p>
</header>

<div class="container">

<h2>الأقسام</h2>

<div class="grid">

  <div class="card">
   <!-- Drinks -->
<img src="https://images.unsplash.com/photo-1603398938378-e54eab446dde?w=600" />

<!-- Snacks -->
<img src="https://images.unsplash.com/photo-1621939514649-280e2ee25f60?w=600" />

<!-- Dairy -->
<img src="https://images.unsplash.com/photo-1628088062854-d1870b4553da?w=600" />
  </div>

</div>

</div>

</body>
</html>
