<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المشروبات - هلا شوب</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  background:#0b1220;
  color:white;
}

header{
  background:#16a34a;
  text-align:center;
  padding:30px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.product{
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  text-align:center;
}

.product img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.product p{
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* CART */
.cart{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

/* WHATSAPP BUTTON */
.checkout{
  margin-top:10px;
  display:inline-block;
  background:#25D366;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h1>🥤 المشروبات</h1>
</header>

<div class="container">

<div class="grid">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1622483767028-7b4c7a0c3c34?w=600">
    <p>كينزا - 0.250 KD</p>
    <button onclick="add('كينزا',0.250)">أضف للسلة</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1613478223719-2ab802602423?w=600">
    <p>فريز - 0.300 KD</p>
    <button onclick="add('فريز',0.300)">أضف للسلة</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1523362628745-0c100150b504?w=600">
    <p>مياه - 0.100 KD</p>
    <button onclick="add('مياه',0.100)">أضف للسلة</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1625772299848-3c2f8c7c2b5a?w=600">
    <p>بيبسي - 0.250 KD</p>
    <button onclick="add('بيبسي',0.250)">أضف للسلة</button>
  </div>

</div>

<!-- CART -->
<div class="cart">
  <h3>🛒 السلة</h3>
  <div id="items"></div>
  <p>المجموع: <span id="total">0.000</span> KD</p>

  <a class="checkout" onclick="checkout()">إرسال الطلب واتساب</a>
</div>

<br>
<a href="index.html" style="color:#22c55e">⬅ رجوع</a>

</div>

<script>
let cart = [];
let total = 0;

function add(name, price){
  cart.push({name, price});
  total += price;
  render();
}

function render(){
  document.getElementById("items").innerHTML =
    cart.map(i => `<div class="cart-item">
      <span>${i.name}</span>
      <span>${i.price.toFixed(3)} KD</span>
    </div>`).join("");

  document.getElementById("total").innerText = total.toFixed(3);
}

function checkout(){
  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  let msg = "طلب جديد:%0A";
  cart.forEach(i=>{
    msg += `- ${i.name} ${i.price} KD%0A`;
  });

  msg += `%0Aالمجموع: ${total.toFixed(3)} KD`;

  window.open("https://wa.me/96597984011?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
