<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المشروبات</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

header{
  background:#16a34a;
  text-align:center;
  padding:30px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.product{
  background:#111827;
  border-radius:16px;
  overflow:hidden;
  text-align:center;
}

.product img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.product button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.cart{
  background:#1f2937;
  padding:15px;
  margin-top:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  <h1>🥤 المشروبات</h1>
</header>

<div class="container">

<div class="grid">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97">
    <p>كينزا - 0.250 KD</p>
    <button onclick="add('كينزا',0.250)">أضف</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1625772299848-391b3b8c2f8a">
    <p>فريز - 0.300 KD</p>
    <button onclick="add('فريز',0.300)">أضف</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba3">
    <p>مياه - 0.100 KD</p>
    <button onclick="add('مياه',0.100)">أضف</button>
  </div>

</div>

<div class="cart">
<h3>🛒 السلة</h3>
<div id="items"></div>
<p>المجموع: <span id="total">0</span> KD</p>

<button onclick="checkout()">إرسال واتساب</button>
</div>

<br>
<a href="index.html" style="color:#22c55e">⬅ رجوع</a>

</div>

<script>
let cart=[];
let total=0;

function add(name,price){
  cart.push({name,price});
  total+=price;
  render();
}

function render(){
  document.getElementById("items").innerHTML =
  cart.map(i=>`<div>${i.name} - ${i.price}</div>`).join("");
  document.getElementById("total").innerText=total.toFixed(3);
}

function checkout(){
  let msg="طلب جديد:%0A";
  cart.forEach(i=>{
    msg+=`- ${i.name} ${i.price} KD%0A`;
  });
  msg+=`%0Aالمجموع: ${total.toFixed(3)} KD`;

  window.open("https://wa.me/96597984011?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
