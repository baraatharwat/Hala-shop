<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المشروبات</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  background:#0f172a;
  color:white;
}

header{
  background:#16a34a;
  text-align:center;
  padding:30px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.item{
  background:#111827;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

button{
  background:#22c55e;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  font-weight:bold;
  margin-top:8px;
}

.cart{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.btn{
  display:inline-block;
  background:#25D366;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  margin-top:10px;
}
</style>

</head>

<body>

<header>
  <h1>🥤 المشروبات</h1>
</header>

<div class="container">

<div class="grid">

  <div class="item">
    كينزا<br>0.250 KD
    <button onclick="add('كينزا',0.250)">أضف</button>
  </div>

  <div class="item">
    فريز<br>0.300 KD
    <button onclick="add('فريز',0.300)">أضف</button>
  </div>

  <div class="item">
    مياه<br>0.100 KD
    <button onclick="add('مياه',0.100)">أضف</button>
  </div>

</div>

<div class="cart">
  <h3>🛒 السلة</h3>
  <div id="cartItems"></div>
  <p>المجموع: <span id="total">0</span> KD</p>

  <button onclick="checkout()">إرسال واتساب</button>
</div>

<br>
<a href="index.html" style="color:#22c55e">⬅ رجوع</a>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function add(name,price){
  cart.push({name,price});
  save();
  render();
}

function render(){
  let html = "";
  let total = 0;

  cart.forEach((i,idx)=>{
    total += i.price;
    html += `<div class="cart-item">
      <span>${i.name}</span>
      <span>${i.price.toFixed(3)}</span>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(3);
}

function checkout(){
  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  let msg = "طلب جديد:%0A";
  let total = 0;

  cart.forEach(i=>{
    msg += `- ${i.name} ${i.price} KD%0A`;
    total += i.price;
  });

  msg += `%0Aالمجموع: ${total.toFixed(3)} KD`;

  window.open("https://wa.me/96597984011?text=" + encodeURIComponent(msg));
}

render();
</script>

</body>
</html>
