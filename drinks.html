<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المشروبات</title>

<style>
body{

  font-family: system-ui, Arial;
  background:#0f172a;
  color:white;
}

header{
  background:#16a34a;
  text-align:center;
  padding:30px;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.item{
  background:#111827;
  padding:20px;
  border-radius:12px;
  text-align:center;
  font-size:18px;
}

.price{
  margin:8px 0;
  color:#a7f3d0;
}

.btn{
  display:inline-block;
  background:#22c55e;
  color:black;
  padding:10px 12px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}
</style>

</head>

<body>

<header>
  <h1>🥤 المشروبات</h1>
</header>

<div class="container">

<div class="grid">

  <div class="item">

       href="https://wa.me/96597984011?text=أريد%20طلب%20كينزا%20بسعر%200.250%20KD">
       طلب عبر واتساب
    </a>
  </div>

  <div class="item">

       href="https://wa.me/96597984011?text=أريد%20طلب%20فريز%20بسعر%200.300%20KD">

    </a>

  <div class="item">

       طلب عبر واتساب
    </a>
  </div>

  <div class="item">
    بيبسي

    <a class="btn"
       href="https://wa.me/96597984011?text=أريد%20طلب%20بيبسي%20بسعر%200.250%20KD">

</div>

</div>

</body>
</html>
