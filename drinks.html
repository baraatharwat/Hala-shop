let total=0;

let cartData = JSON.parse(localStorage.getItem("halaCart")) || {};

window.onload = function(){

["p1","p2","p3","p4"].forEach(id=>{

}

});

function plus(id){

let x = document.getElementById(id);

x.innerText = parseInt(x.innerText) + 1;

// save in cart
cartData[id] = parseInt(x.innerText);

localStorage.setItem("halaCart", JSON.stringify(cartData));

// update total
total++;

document.getElementById("cart").innerText = total;

function minus(id){

let x = document.getElementById(id);

if(parseInt(x.innerText) > 0){

x.innerText = parseInt(x.innerText) - 1;

// update cart storage
cartData[id] = parseInt(x.innerText);

localStorage.setItem("halaCart", JSON.stringify(cartData));

// update total
total--;

document.getElementById("cart").innerText = total;

}

}
